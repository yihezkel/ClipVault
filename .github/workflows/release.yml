name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Locate and rename APK
        id: apk
        run: |
          apk=$(ls app/build/outputs/apk/debug/*.apk | head -n1)
          name="ClipVault-${GITHUB_REF_NAME}.apk"
          cp "$apk" "$name"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipVault-${{ github.ref_name }}
          path: ${{ steps.apk.outputs.name }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.name }}
          generate_release_notes: true
          draft: false
          prerelease: false
